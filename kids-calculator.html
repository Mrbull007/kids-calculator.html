<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculator {
      background: #1e1e2f;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      width: 320px;
    }

    .display {
      background: #0f0f1a;
      color: white;
      font-size: 2.5rem;
      text-align: right;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      min-height: 80px;
      word-break: break-all;
      box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      font-size: 1.4rem;
      padding: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    button:hover {
      transform: scale(1.05);
    }

    .number, .decimal {
      background: #2d2d44;
      color: white;
    }

    .operator {
      background: #ff9500;
      color: white;
      font-weight: bold;
    }

    .clear, .delete {
      background: #3a3a5c;
      color: #ff6b6b;
    }

    .equals {
      background: #00d4ff;
      color: #1e1e2f;
      font-weight: bold;
      grid-column: span 2;
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="display" id="display">0</div>
    
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">AC</button>
      <button class="delete" onclick="deleteLast()">DEL</button>
      <button class="operator" onclick="appendToDisplay('/')">/</button>
      <button class="operator" onclick="appendToDisplay('*')">×</button>

      <button class="number" onclick="appendToDisplay('7')">7</button>
      <button class="number" onclick="appendToDisplay('8')">8</button>
      <button class="number" onclick="appendToDisplay('9')">9</button>
      <button class="operator" onclick="appendToDisplay('-')">-</button>

      <button class="number" onclick="appendToDisplay('4')">4</button>
      <button class="number" onclick="appendToDisplay('5')">5</button>
      <button class="number" onclick="appendToDisplay('6')">6</button>
      <button class="operator" onclick="appendToDisplay('+')">+</button>

      <button class="number" onclick="appendToDisplay('1')">1</button>
      <button class="number" onclick="appendToDisplay('2')">2</button>
      <button class="number" onclick="appendToDisplay('3')">3</button>
      <button class="equals" onclick="calculate()">=</button>

      <button class="number" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
      <button class="decimal" onclick="appendToDisplay('.')">.</button>
    </div>
  </div>

  <script>
    let display = document.getElementById('display');
    let currentInput = '0';
    let shouldResetDisplay = false;

    function updateDisplay() {
      display.textContent = currentInput;
    }

    function appendToDisplay(value) {
      if (shouldResetDisplay) {
        currentInput = '0';
        shouldResetDisplay = false;
      }

      if (currentInput === '0' && value !== '.') {
        currentInput = value;
      } else {
        currentInput += value;
      }
      updateDisplay();
    }

    function clearDisplay() {
      currentInput = '0';
      updateDisplay();
    }

    function deleteLast() {
      if (currentInput.length > 1) {
        currentInput = currentInput.slice(0, -1);
      } else {
        currentInput = '0';
      }
      updateDisplay();
    }

    function calculate() {
      try {
        // Replace × with * for evaluation
        let expression = currentInput.replace(/×/g, '*');
        let result = eval(expression);
        
        // Handle division by zero and invalid results
        if (!isFinite(result)) {
          currentInput = 'Error';
        } else {
          currentInput = parseFloat(result.toFixed(8)).toString();
        }
      } catch (error) {
        currentInput = 'Error';
      }
      
      updateDisplay();
      shouldResetDisplay = true;
    }

    // Keyboard support
    document.addEventListener('keydown', function(event) {
      if (event.key >= '0' && event.key <= '9') {
        appendToDisplay(event.key);
      } else if (event.key === '.') {
        appendToDisplay('.');
      } else if (event.key === '+') {
        appendToDisplay('+');
      } else if (event.key === '-') {
        appendToDisplay('-');
      } else if (event.key === '*') {
        appendToDisplay('*');
      } else if (event.key === '/') {
        appendToDisplay('/');
      } else if (event.key === 'Enter' || event.key === '=') {
        calculate();
      } else if (event.key === 'Backspace') {
        deleteLast();
      } else if (event.key === 'Escape') {
        clearDisplay();
      }
    });

    // Initialize display
    updateDisplay();
  </script>

</body>
</html>
